<rect width="100%" height="100%" fill="#FFFFFF"/>
<text x="540.0" y="70" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#083B7A" text-anchor="middle">Rule-Based Strategy + Pyomo</text><text x="540.0" y="120" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#083B7A" text-anchor="middle">Dispatch Interaction</text><text x="540.0" y="158" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#667085" text-anchor="middle">What rules decide, what Pyomo solves, and what becomes fixed for the next market stage</text><rect x="55" y="210" width="310" height="55" rx="15" fill="#0B6F6B" stroke="#0B6F6B" stroke-width="0"/><text x="210.0" y="246" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">RULE-BASED LOGIC</text><rect x="383" y="210" width="310" height="55" rx="15" fill="#083B7A" stroke="#083B7A" stroke-width="0"/><text x="538.0" y="246" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">PYOMO DISPATCH</text><rect x="711" y="210" width="310" height="55" rx="15" fill="#0B6F6B" stroke="#0B6F6B" stroke-width="0"/><text x="866.0" y="246" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">FIXED OUTPUT</text><circle cx="45" cy="317" r="28" fill="#083B7A"/><text x="45" y="327" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text><text x="83" y="325" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#083B7A" text-anchor="start">aFRR capacity</text><rect x="55" y="342" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="95" cy="390" r="34" fill="#E7F7F5"/><text x="95" y="398.4" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0B6F6B" text-anchor="middle">IF</text><text x="140" y="376" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">4-hour block price vs</text><text x="140" y="399" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">opportunity cost;</text><text x="140" y="422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">activation-safety check;</text><text x="140" y="445" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">technical headroom.</text><rect x="383" y="342" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#96BDE6" stroke-width="2"/><circle cx="423" cy="390" r="34" fill="#EAF4FF"/><rect x="395.0" y="370.4" width="56.0" height="39.199999999999996" rx="6" fill="none" stroke="#083B7A" stroke-width="5"/><text x="423" y="397.0" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#083B7A" text-anchor="middle">P</text><text x="468" y="376" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">Check reserve</text><text x="468" y="399" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">feasibility; protect</text><text x="468" y="422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">charge and storage space.</text><rect x="711" y="342" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="751" cy="390" r="34" fill="#E7F7F5"/><polyline points="734.2,387.9 746.8,402.6 770.6,374.6" fill="none" stroke="#0B6F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="796" y="376" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">reserved_capacity_MW[block];</text><text x="796" y="399" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">capacity revenue.</text><line x1="368" y1="422" x2="379" y2="422" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="696" y1="422" x2="707" y2="422" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="45" cy="567" r="28" fill="#083B7A"/><text x="45" y="577" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text><text x="83" y="575" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#083B7A" text-anchor="start">Day-Ahead</text><rect x="55" y="592" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="95" cy="640" r="34" fill="#E7F7F5"/><text x="95" y="648.4" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0B6F6B" text-anchor="middle">IF</text><text x="140" y="626" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">15-min schedule; compare</text><text x="140" y="649" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">DA price to gas</text><text x="140" y="672" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">benchmark; respect</text><text x="140" y="695" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">reserved headroom.</text><rect x="383" y="592" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#96BDE6" stroke-width="2"/><circle cx="423" cy="640" r="34" fill="#EAF4FF"/><rect x="395.0" y="620.4" width="56.0" height="39.199999999999996" rx="6" fill="none" stroke="#083B7A" stroke-width="5"/><text x="423" y="647.0" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#083B7A" text-anchor="middle">P</text><text x="468" y="626" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">Min-cost useful heat</text><text x="468" y="649" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">dispatch: ETES</text><text x="468" y="672" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">charge/discharge plus gas</text><text x="468" y="695" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">boiler.</text><rect x="711" y="592" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="751" cy="640" r="34" fill="#E7F7F5"/><polyline points="734.2,637.9 746.8,652.6 770.6,624.6" fill="none" stroke="#0B6F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="796" y="626" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">DA_position_MWh[t]; SoC</text><text x="796" y="649" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">trajectory.</text><line x1="368" y1="672" x2="379" y2="672" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="696" y1="672" x2="707" y2="672" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="45" cy="817" r="28" fill="#083B7A"/><text x="45" y="827" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text><text x="83" y="825" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#083B7A" text-anchor="start">Intraday Continuous</text><rect x="55" y="842" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="95" cy="890" r="34" fill="#E7F7F5"/><text x="95" y="898.4" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0B6F6B" text-anchor="middle">IF</text><text x="140" y="876" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">ID3 proxy; buy if cheap;</text><text x="140" y="899" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">sell/reduce if expensive;</text><text x="140" y="922" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">DA remains baseline.</text><rect x="383" y="842" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#96BDE6" stroke-width="2"/><circle cx="423" cy="890" r="34" fill="#EAF4FF"/><rect x="395.0" y="870.4" width="56.0" height="39.199999999999996" rx="6" fill="none" stroke="#083B7A" stroke-width="5"/><text x="423" y="897.0" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#083B7A" text-anchor="middle">P</text><text x="468" y="876" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">Re-optimise feasible</text><text x="468" y="899" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">adjustment while still</text><text x="468" y="922" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">protecting reserve</text><text x="468" y="945" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">headroom.</text><rect x="711" y="842" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="751" cy="890" r="34" fill="#E7F7F5"/><polyline points="734.2,887.9 746.8,902.6 770.6,874.6" fill="none" stroke="#0B6F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="796" y="876" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">IDC_buy/sell_MWh[t];</text><text x="796" y="899" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">final_planned_electricity[t].</text><line x1="368" y1="922" x2="379" y2="922" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="696" y1="922" x2="707" y2="922" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="45" cy="1067" r="28" fill="#083B7A"/><text x="45" y="1077" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text><text x="83" y="1075" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#083B7A" text-anchor="start">aFRR down energy</text><rect x="55" y="1092" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="95" cy="1140" r="34" fill="#E7F7F5"/><text x="95" y="1148.4" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0B6F6B" text-anchor="middle">IF</text><text x="140" y="1126" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">15-min activation;</text><text x="140" y="1149" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">capacity-backed if</text><text x="140" y="1172" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">enabled, free/proxy if</text><text x="140" y="1195" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">disabled.</text><rect x="383" y="1092" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#96BDE6" stroke-width="2"/><circle cx="423" cy="1140" r="34" fill="#EAF4FF"/><rect x="395.0" y="1120.4" width="56.0" height="39.199999999999996" rx="6" fill="none" stroke="#083B7A" stroke-width="5"/><text x="423" y="1147.0" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#083B7A" text-anchor="middle">P</text><text x="468" y="1126" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">No free activation</text><text x="468" y="1149" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">decision; check useful-</text><text x="468" y="1172" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">heat/storage cap.</text><rect x="711" y="1092" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="751" cy="1140" r="34" fill="#E7F7F5"/><polyline points="734.2,1137.9 746.8,1152.6 770.6,1124.6" fill="none" stroke="#0B6F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="796" y="1126" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">activated_aFRR_MWh[t];</text><text x="796" y="1149" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">actual_electricity[t].</text><line x1="368" y1="1172" x2="379" y2="1172" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="696" y1="1172" x2="707" y2="1172" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><circle cx="45" cy="1317" r="28" fill="#083B7A"/><text x="45" y="1327" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text><text x="83" y="1325" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#083B7A" text-anchor="start">Final accounting</text><rect x="55" y="1342" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="95" cy="1390" r="34" fill="#E7F7F5"/><text x="95" y="1398.4" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0B6F6B" text-anchor="middle">IF</text><text x="140" y="1376" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">Collect all fixed market</text><text x="140" y="1399" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">positions; apply prices</text><text x="140" y="1422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">and revenues.</text><rect x="383" y="1342" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#96BDE6" stroke-width="2"/><circle cx="423" cy="1390" r="34" fill="#EAF4FF"/><rect x="395.0" y="1370.4" width="56.0" height="39.199999999999996" rx="6" fill="none" stroke="#083B7A" stroke-width="5"/><text x="423" y="1397.0" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#083B7A" text-anchor="middle">P</text><text x="468" y="1376" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">Final physical dispatch</text><text x="468" y="1399" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">consistency; heat and</text><text x="468" y="1422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">storage balances.</text><rect x="711" y="1342" width="310" height="160" rx="18" fill="#FFFFFF" stroke="#B9D8F4" stroke-width="2"/><circle cx="751" cy="1390" r="34" fill="#E7F7F5"/><polyline points="734.2,1387.9 746.8,1402.6 770.6,1374.6" fill="none" stroke="#0B6F6B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="796" y="1376" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">gross cost; capacity</text><text x="796" y="1399" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">revenue; net operating</text><text x="796" y="1422" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#0B1F44">cost.</text><line x1="368" y1="1422" x2="379" y2="1422" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="696" y1="1422" x2="707" y2="1422" stroke="#128B86" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="55" y="1550" width="970" height="160" rx="22" fill="#F7FBFF" stroke="#128B86" stroke-width="2"/><text x="85" y="1590" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#0B6F6B" text-anchor="start">Core algorithmic idea</text><text x="90" y="1628" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#0B1F44" text-anchor="start">• Rules decide market participation, thresholds and bounds.</text><text x="90" y="1656" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#0B1F44" text-anchor="start">• Pyomo checks plant-feasible dispatch under those bounds.</text><text x="90" y="1684" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#0B1F44" text-anchor="start">• Fixed positions are carried forward to later markets and accounting.</text><rect x="55" y="1750" width="970" height="105" rx="18" fill="#083B7A" stroke="#083B7A" stroke-width="0"/><text x="540.0" y="1788" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">Capacity enabled: aFRR capacity → DA → IDC → capacity-backed aFRR energy → final dispatch</text><text x="540.0" y="1826" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#BFEAE7" text-anchor="middle">Capacity disabled: DA → IDC → free/proxy aFRR down energy → final dispatch</text>
</svg>
