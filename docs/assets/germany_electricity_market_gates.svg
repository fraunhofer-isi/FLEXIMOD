<svg viewBox="0 0 860 400" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2240"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="diamond" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <polygon points="4,0 8,4 4,8 0,4" fill="#fff" stroke="#555" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="400" rx="10" fill="url(#bg)"/>

  <!-- Grid setup: x=170 (start D-1 00:00) to x=810 (D+1 00:00) = 640px for 48h → 13.33px/hr -->

  <!-- Hour grid lines -->
  <!-- Every 6 hours: 6h=80px, 12h=160px, 18h=240px, 24h=320px, 30h=400px, 36h=480px, 42h=560px -->
  <g stroke="#1e2d50" stroke-width="1">
    <line x1="170" y1="50" x2="170" y2="360"/>
    <line x1="250" y1="50" x2="250" y2="360"/>
    <line x1="330" y1="50" x2="330" y2="360"/>
    <line x1="410" y1="50" x2="410" y2="360"/>
    <line x1="490" y1="50" x2="490" y2="360"/>
    <line x1="570" y1="50" x2="570" y2="360"/>
    <line x1="650" y1="50" x2="650" y2="360"/>
    <line x1="730" y1="50" x2="730" y2="360"/>
    <line x1="810" y1="50" x2="810" y2="360"/>
  </g>

  <!-- Delivery day shading (D 00:00–24:00 = x490–x810) -->
  <rect x="490" y="50" width="320" height="310" fill="#1e3a5f" opacity="0.35"/>
  <text x="650" y="46" text-anchor="middle" font-size="10" fill="#4fc3f7" font-weight="600">DELIVERY DAY (D)</text>

  <!-- Time axis labels -->
  <g font-size="10" fill="#90a4ae" text-anchor="middle">
    <text x="170" y="375">D-1 00:00</text>
    <text x="250" y="375">06:00</text>
    <text x="330" y="375">12:00</text>
    <text x="410" y="375">18:00</text>
    <text x="490" y="375">D 00:00</text>
    <text x="570" y="375">06:00</text>
    <text x="650" y="375">12:00</text>
    <text x="730" y="375">18:00</text>
    <text x="810" y="375">D+1 00:00</text>
  </g>

  <!-- Row labels -->
  <g font-size="11" fill="#b0bec5" font-weight="600">
    <text x="162" y="104" text-anchor="end">aFRR</text>
    <text x="162" y="116" text-anchor="end">Capacity</text>
    <text x="162" y="174" text-anchor="end">Day-Ahead</text>
    <text x="162" y="186" text-anchor="end">(EPEX SPOT)</text>
    <text x="162" y="254" text-anchor="end">Intraday</text>
    <text x="162" y="266" text-anchor="end">Continuous</text>
    <text x="162" y="330" text-anchor="end">aFRR Energy</text>
    <text x="162" y="342" text-anchor="end">(PICASSO)</text>
  </g>

  <!-- Row separators -->
  <g stroke="#2a3a5c" stroke-width="1">
    <line x1="0" y1="137" x2="860" y2="137"/>
    <line x1="0" y1="207" x2="860" y2="207"/>
    <line x1="0" y1="297" x2="860" y2="297"/>
    <line x1="0" y1="360" x2="860" y2="360"/>
    <line x1="0" y1="62" x2="860" y2="62"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════
       ROW 1: aFRR CAPACITY
       Gate open: D-2 (always open), Gate close: D-1 09:00 = x170+9*13.33 = x290
       Results: ~D-1 10:30 = x310
       Delivery: D 00:00–24:00 = x490–x810
  ════════════════════════════════════════════════════════ -->
  <!-- Bidding window (open → gate close D-1 09:00) -->
  <rect x="170" y="76" width="120" height="44" rx="4" fill="#7c4dff" opacity="0.85"/>
  <text x="230" y="102" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Bidding Open</text>
  <!-- Gate close line at D-1 09:00 (x=290) -->
  <line x1="290" y1="68" x2="290" y2="132" stroke="#ff5252" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="290" y="66" text-anchor="middle" font-size="9" fill="#ff5252" font-weight="700">09:00</text>
  <!-- Post-gate pre-delivery window -->
  <rect x="290" y="76" width="200" height="44" rx="4" fill="#311b92" opacity="0.7"/>
  <text x="390" y="102" text-anchor="middle" font-size="10" fill="#b39ddb">Evaluation &amp; Award</text>
  <!-- Results diamond at ~D-1 10:30 (x=170+10.5*13.33=310) -->
  <polygon points="310,90 316,98 310,106 304,98" fill="#fff" stroke="#7c4dff" stroke-width="1.5"/>
  <text x="314" y="118" font-size="8.5" fill="#ce93d8">Results ~10:30</text>
  <!-- Delivery bar -->
  <rect x="490" y="76" width="320" height="44" rx="4" fill="#26a69a" opacity="0.85"/>
  <text x="650" y="102" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Delivery D 00:00 – 24:00</text>

  <!-- ═══════════════════════════════════════════════════════
       ROW 2: DAY-AHEAD (EPEX SPOT)
       Gate open: D-1 00:00 (x=170), Gate close: D-1 12:00 (x=330)
       Results: D-1 12:42 (x=339), Delivery: D 00:00–24:00
  ════════════════════════════════════════════════════════ -->
  <rect x="170" y="146" width="160" height="44" rx="4" fill="#1565c0" opacity="0.9"/>
  <text x="250" y="172" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Bidding Open</text>
  <!-- Gate close D-1 12:00 -->
  <line x1="330" y1="138" x2="330" y2="202" stroke="#ff5252" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="330" y="136" text-anchor="middle" font-size="9" fill="#ff5252" font-weight="700">12:00</text>
  <!-- Post-gate pre-delivery -->
  <rect x="330" y="146" width="160" height="44" rx="4" fill="#0d2a6b" opacity="0.7"/>
  <text x="410" y="172" text-anchor="middle" font-size="10" fill="#90caf9">Market Clearing</text>
  <!-- Results diamond at D-1 12:42 (x=330+0.7*13.33=339) -->
  <polygon points="339,158 345,166 339,174 333,166" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="350" y="195" font-size="8.5" fill="#90caf9">Results ~12:42</text>
  <!-- Delivery bar -->
  <rect x="490" y="146" width="320" height="44" rx="4" fill="#26a69a" opacity="0.85"/>
  <text x="650" y="172" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Delivery D 00:00 – 24:00</text>

  <!-- ═══════════════════════════════════════════════════════
       ROW 3: INTRADAY CONTINUOUS
       Gate open: D-1 15:00 (x=410+13.33*3=450) for D delivery
         actually D-1 15:00 = x170 + 15*13.33 = x170+200 = x370
       Rolling gate close: 30 min before each delivery interval
       Delivery: D 00:00–24:00
  ════════════════════════════════════════════════════════ -->
  <!-- Gate open line at D-1 15:00 (x = 170 + 15*13.33 = 370) -->
  <line x1="370" y1="218" x2="370" y2="282" stroke="#4caf50" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="370" y="216" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="700">Gate Open 15:00</text>
  <!-- Continuous trading from gate open through delivery (rolling 30-min gate) -->
  <rect x="370" y="216" width="440" height="44" rx="4" fill="#e65100" opacity="0.75"/>
  <!-- Rolling gate close arrow annotation (30 min before delivery) -->
  <text x="590" y="242" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Continuous Trading (rolling gate close –30 min)</text>
  <!-- Striped overlay on delivery portion to show continuous trading into delivery -->
  <rect x="490" y="216" width="320" height="44" rx="4" fill="none" stroke="#ffcc80" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ═══════════════════════════════════════════════════════
       ROW 4: aFRR ENERGY (PICASSO)
       Continuous real-time bidding, NRT gate close ~25s before activation
  ════════════════════════════════════════════════════════ -->
  <!-- Continuous bidding entire timeline -->
  <rect x="170" y="306" width="640" height="44" rx="4" fill="#f9a825" opacity="0.75"/>
  <text x="490" y="332" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="700">Continuous Near-Real-Time Bidding (NRT gate close: ~25 sec before activation)</text>

  <!-- ═══════════════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════════════ -->
  <g transform="translate(170, 382)">
    <rect x="0" y="0" width="12" height="8" rx="2" fill="#7c4dff"/>
    <text x="16" y="8" font-size="9" fill="#b0bec5">aFRR Cap. Bidding</text>
    <rect x="115" y="0" width="12" height="8" rx="2" fill="#1565c0"/>
    <text x="131" y="8" font-size="9" fill="#b0bec5">DA Bidding</text>
    <rect x="210" y="0" width="12" height="8" rx="2" fill="#e65100"/>
    <text x="226" y="8" font-size="9" fill="#b0bec5">Intraday Cont.</text>
    <rect x="320" y="0" width="12" height="8" rx="2" fill="#f9a825"/>
    <text x="336" y="8" font-size="9" fill="#b0bec5">aFRR Energy (NRT)</text>
    <rect x="455" y="0" width="12" height="8" rx="2" fill="#26a69a"/>
    <text x="471" y="8" font-size="9" fill="#b0bec5">Delivery</text>
    <line x1="532" y1="0" x2="544" y2="8" stroke="#ff5252" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="532" y1="8" x2="544" y2="0" stroke="#ff5252" stroke-width="1.5"/>
    <text x="548" y="8" font-size="9" fill="#b0bec5">Gate Close</text>
  </g>
</svg>
